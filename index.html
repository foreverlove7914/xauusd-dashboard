<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAUUSD PRO Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://s3.tradingview.com/tv.js"></script>

</head>

<body>

<h1>🏆 XAUUSD PRO DASHBOARD</h1>

<div class="topbar">

<select id="timeframe">
<option value="1min">M1</option>
<option value="5min">M5</option>
<option value="15min">M15</option>
<option value="30min">M30</option>
<option value="1h">H1</option>
<option value="4h">H4</option>
<option value="1day">D1</option>
<option value="1week">W1</option>
</select>

<div class="status">
Harga :
<span id="price">Loading...</span>
</div>

<div class="status">
Trend :
<span id="trend">Loading...</span>
</div>

<div class="status">
Signal :
<span id="signal">Loading...</span>
</div>

</div>

<div id="tvchart"></div>

<div class="analysis">

<div class="box">
EMA20
<h3 id="ema20">--</h3>
</div>

<div class="box">
EMA50
<h3 id="ema50">--</h3>
</div>

<div class="box">
EMA200
<h3 id="ema200">--</h3>
</div>

<div class="box">
RSI
<h3 id="rsi">--</h3>
</div>

<div class="box">
MACD
<h3 id="macd">--</h3>
</div>

<div class="box">
FINAL
<h3 id="finalSignal">--</h3>
</div>

</div>

<script src="config.js"></script>
<script src="indicators.js"></script>
<script src="app.js"></script>

</body>
</html>
