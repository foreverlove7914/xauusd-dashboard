
<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Pro Dashboard</title>

    <link rel="stylesheet" href="style.css">

    
</head>

<body>

<h1>XAUUSD PRO DASHBOARD</h1>

<div class="info">

<div class="card">
<h2>Harga</h2>
<p id="price">Loading...</p>
</div>

<div class="card">
<h2>Trend</h2>
<p id="trend">Loading...</p>
</div>

<div class="card">
<h2>Signal</h2>
<p id="signal">Loading...</p>
</div>
    <div class="card">
    <h2>Analisis Teknikal</h2>

    <p><b>EMA 20:</b> <span id="ema20">Loading...</span></p>
    <p><b>EMA 50:</b> <span id="ema50">Loading...</span></p>
    <p><b>EMA 200:</b> <span id="ema200">Loading...</span></p>

    <hr>

    <p><b>RSI:</b> <span id="rsi">Loading...</span></p>
    <p><b>MACD:</b> <span id="macd">Loading...</span></p>

    <hr>

    <h3 id="finalSignal">Menunggu Analisis...</h3>
    </div>

</div>

<div class="tradingview-widget-container">
  <div id="tradingview_chart"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
    container_id: "tradingview_chart",
    width: "100%",
    height: 600,
    symbol: "OANDA:XAUUSD",
    interval: "5",
    timezone: "Asia/Kuala_Lumpur",
    theme: "dark",
    style: "1",
    locale: "ms",
    toolbar_bg: "#0d1117",
    enable_publishing: false,
    allow_symbol_change: false
});
</script>

<script src="config.js"></script>
<script src="indicators.js"></script>
<script src="app.js"></script>

</body>
</html>
